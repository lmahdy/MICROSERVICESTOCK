version: '3.8'

services:

  # ==============================
  #  DATABASES
  # ==============================

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderly_users
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  #  RABBITMQ
  # ==============================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==============================
  #  KEYCLOAK
  # ==============================

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./orderly-realm.json:/opt/keycloak/data/import/orderly-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/orderly HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'orderly' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ==============================
  #  INFRASTRUCTURE SERVICES
  # ==============================

  discovery:
    build: ./discovery
    image: discovery:1.0
    container_name: discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  config-server:
    build: ./config-server
    image: config-server:1.0
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
    depends_on:
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    build: ./gateway
    image: gateway:1.0
    container_name: gateway
    ports:
      - "9016:9016"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS: "10"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ==============================
  #  BUSINESS SERVICES
  # ==============================

  user-service:
    build: ./services/user-service
    image: user-service:1.0
    container_name: user-service
    ports:
      - "8090:8090"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/orderly_users?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  store-service:
    build: ./services/store-service
    image: store-service:1.0
    container_name: store-service
    ports:
      - "8094:8094"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  product-service:
    build: ./services/product-service
    image: product-service:1.0
    container_name: product-service
    ports:
      - "8093:8093"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    image: order-service:1.0
    container_name: order-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  complaint-service:
    build: ./services/complaint-service
    image: complaint-service:1.0
    container_name: complaint-service
    ports:
      - "8086:8086"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/orderly_complaint?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  delivery-service:
    build: ./services/delivery-service
    image: delivery-service:1.0
    container_name: delivery-service
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/orderly_delivery?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/orderly
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/orderly/protocol/openid-connect/certs
      GATEWAY_URL: http://gateway:9016
    depends_on:
      discovery:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    image: notification-service:1.0
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      MONGO_URI: mongodb://mongodb:27017/orderly_notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://localhost:9090
      KEYCLOAK_REALM: orderly
      EUREKA_HOST: discovery
      EUREKA_PORT: "8761"
      HOSTNAME: notification-service
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ==============================
  #  FRONTEND
  # ==============================

  frontend:
    build: ./frontend/orderly-frontend
    image: frontend:1.0
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  mysql-data:
  mongo-data:
  keycloak-data:
