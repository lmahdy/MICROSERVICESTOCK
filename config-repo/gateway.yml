spring:
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Set-Cookie
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: users
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
        - id: stores
          uri: lb://STORE-SERVICE
          predicates:
            - Path=/api/stores/**
        - id: products
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**
        - id: orders
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
        - id: deliveries
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/api/deliveries/**
        - id: complaints
          uri: lb://COMPLAINT-SERVICE
          predicates:
            - Path=/api/complaints/**
        - id: notifications
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowCredentials: true
        add-to-simple-url-handler-mapping: true

server:
  port: 9016

springdoc:
  api-docs:
    enabled: false
